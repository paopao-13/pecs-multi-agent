name: Production Benchmark CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run production benchmark (CI gate, no LLM key)
        # --ci 隐含 --skip-run-task：纯服务层门禁（启动/延迟/并发/容错/稳定性/HOL），
        # 任意一项不达标即退出码 2 → PR 变红。不消耗任何 LLM 额度。
        run: python scripts/benchmark_production.py --ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-bench
          path: results/production_bench.json
