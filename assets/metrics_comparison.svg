<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="reactBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pecsBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1E293B">PECS vs ReAct: Evaluation Results</text>
  <text x="400" y="50" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748B">Sample/Mock dataset | DeepSeek-V3 | 2026-07-12</text>

  <!-- Chart area: x=80 to x=720, y=80 to y=360 -->
  <!-- Y-axis -->
  <line x1="80" y1="80" x2="80" y2="360" stroke="#CBD5E1" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="80" y1="360" x2="720" y2="360" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Y-axis labels (0-100%) -->
  <text x="70" y="364" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">0%</text>
  <text x="70" y="291" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">25%</text>
  <text x="70" y="218" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">50%</text>
  <text x="70" y="145" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">75%</text>
  <text x="70" y="84" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">100%</text>

  <!-- Grid lines -->
  <line x1="80" y1="290" x2="720" y2="290" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="217" x2="720" y2="217" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="144" x2="720" y2="144" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="83" x2="720" y2="83" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Group 1: GAIA L1 Accuracy (x=140 to x=280) -->
  <!-- ReAct bar: 78.6% -> height = 78.6 * 2.77 = 217.7, y = 360 - 218 = 142 -->
  <rect x="150" y="142" width="50" height="218" rx="3" fill="url(#reactBar)"/>
  <text x="175" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#DC2626">78.6%</text>
  <!-- PECS bar: 100% -> height = 100 * 2.77 = 277, y = 360 - 277 = 83 -->
  <rect x="210" y="83" width="50" height="277" rx="3" fill="url(#pecsBar)"/>
  <text x="235" y="76" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#059669">100%</text>
  <!-- Label -->
  <text x="205" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#334155">GAIA L1</text>
  <text x="205" y="396" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">Accuracy (n=28)</text>
  <!-- Improvement -->
  <text x="205" y="415" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#059669">+21.4pp</text>

  <!-- Group 2: WebShop Success (x=320 to x=460) -->
  <!-- ReAct bar: 66.7% -> height = 66.7 * 2.77 = 184.8, y = 360 - 185 = 175 -->
  <rect x="330" y="175" width="50" height="185" rx="3" fill="url(#reactBar)"/>
  <text x="355" y="168" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#DC2626">66.7%</text>
  <!-- PECS bar: 100% -->
  <rect x="390" y="83" width="50" height="277" rx="3" fill="url(#pecsBar)"/>
  <text x="415" y="76" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#059669">100%</text>
  <!-- Label -->
  <text x="385" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#334155">WebShop</text>
  <text x="385" y="396" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">Success Rate (n=6)</text>
  <text x="385" y="415" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#059669">+33.3pp</text>

  <!-- Group 3: Token Efficiency (inverse, lower is better) -->
  <!-- ReAct: 402 tokens -> normalized to 100% scale for display -->
  <!-- Show as "Token Saved" instead: PECS saves 86.8% -->
  <!-- ReAct bar: 0% saved -->
  <rect x="510" y="357" width="50" height="3" rx="3" fill="url(#reactBar)"/>
  <text x="535" y="350" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#DC2626">0%</text>
  <text x="535" y="338" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#DC2626">(402 tokens)</text>
  <!-- PECS bar: 86.8% saved -->
  <rect x="570" y="120" width="50" height="240" rx="3" fill="url(#pecsBar)"/>
  <text x="595" y="113" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#059669">86.8%</text>
  <text x="595" y="101" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#059669">(53 tokens)</text>
  <!-- Label -->
  <text x="565" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#334155">Token/task</text>
  <text x="565" y="396" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">Savings (lower=better)</text>
  <text x="565" y="415" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#059669">-86.8%</text>

  <!-- Legend -->
  <rect x="580" y="425" width="14" height="14" rx="2" fill="url(#reactBar)"/>
  <text x="600" y="436" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">ReAct Baseline</text>
  <rect x="690" y="425" width="14" height="14" rx="2" fill="url(#pecsBar)"/>
  <text x="710" y="436" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">PECS (Ours)</text>

  <!-- Target line at 75% for GAIA -->
  <line x1="140" y1="152" x2="280" y2="152" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="285" y="155" font-family="Segoe UI, sans-serif" font-size="9" fill="#3B82F6">target ≥75%</text>
</svg>